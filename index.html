<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Reporting</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark text-white">
    <header class="d-flex justify-content-between p-3">
        <h1>Incident Reporting</h1>
        <div class="d-flex align-items-center">
            <select id="language-selector" class="form-control mr-3">
                <option value="en">English</option>
                <option value="en-GB">British English</option>
                <option value="es">Spanish</option>
                <option value="es-ES">Spain Spanish</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="ko">Korean</option>
                <option value="fr">French</option>
                <option value="it">Italian</option>
                <option value="de">German</option>
                <option value="ar">Arabic</option>
                <option value="hi">Hindi</option>
                <option value="ja">Japanese</option>
                <option value="tr">Turkish</option>
                <option value="fa">Persian</option>
            </select>
            <button class="btn btn-outline-light" onclick="window.location.href='login.html'">Login</button>
        </div>
    </header>
    <main class="container">
        <button class="btn btn-primary my-3" onclick="window.location.href='report-form.html'">Report a Rat</button>
        <div class="text-center">
            <div id="animation">
                <!-- Animation will be here -->
                <div class="rat"></div>
                <div class="money-bag"></div>
                <div class="octopus"></div>
            </div>
            <input type="text" id="search-bar" class="form-control my-3" placeholder="Search reports...">
        </div>
        <div class="mt-4">
            <div class="btn-group mb-3" role="group" aria-label="Server Filter">
                <button type="button" class="btn btn-outline-light" onclick="filterReports('WEST')">WEST</button>
                <button type="button" class="btn btn-outline-light" onclick="filterReports('EAST')">EAST</button>
                <button type="button" class="btn btn-outline-light" onclick="filterReports('EUROPE')">EUROPE</button>
            </div>
            <table class="table table-dark table-striped" id="report-table">
                <thead>
                    <tr>
                        <th>Rat</th>
                        <th>Server</th>
                        <th>Loss</th>
                        <th>Date</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Reports will be dynamically populated here -->
                </tbody>
            </table>
            <div class="d-flex justify-content-between">
                <div>
                    <select id="entries-per-page" class="form-control">
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="75">75</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div>
                    <button class="btn btn-outline-light" onclick="firstPage()">First</button>
                    <button class="btn btn-outline-light" onclick="prevPage()">Previous</button>
                    <button class="btn btn-outline-light" onclick="nextPage()">Next</button>
                    <button class="btn btn-outline-light" onclick="lastPage()">Last</button>
                </div>
            </div>
        </div>
    </main>
    <footer class="text-center mt-5">
        <a href="classification.html" class="text-white">Report Classification</a>
        <a href="privacy.html" class="text-white mx-3">Privacy Policy</a>
        <a href="terms.html" class="text-white">Terms of Use</a>
    </footer>
    <button id="theme-toggle" class="btn btn-light position-fixed" style="bottom: 10px; left: 10px;">Toggle Theme</button>
    <script src="scripts.js"></script>
</body>
</html>
