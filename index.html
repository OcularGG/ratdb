<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Reporting</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Hack-ZeroSlash';
            src: url('fonts/hack/hack-regular.woff2') format('woff2'),
                 url('fonts/hack/hack-regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'Lato', sans-serif;
        }
        code, pre, .tooltip-icon {
            font-family: 'Hack-ZeroSlash', monospace;
        }
    </style>
</head>
<body class="bg-light text-dark">
    <header class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">RatDB</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="classification.html">Report Classification</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="privacy.html">Privacy Policy</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="terms.html">Terms of Use</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-primary ml-3" onclick="window.location.href='login.html'">Login</button>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <main class="container mt-5">
        <div class="text-center">
            <h1>Welcome to RatDB</h1>
            <p class="lead">Report and Track Incidents</p>
            <button class="btn btn-primary my-3" onclick="window.location.href='report-form.html'">Report a Rat</button>
            <div class="input-group my-3">
                <input type="text" id="search-bar" class="form-control" placeholder="Search reports...">
                <div class="input-group-append">
                    <button class="btn btn-outline-secondary" type="button">Search</button>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <div class="btn-group mb-3" role="group" aria-label="Server Filter">
                <button type="button" class="btn btn-outline-secondary" onclick="filterReports('WEST')">WEST</button>
                <button type="button" class="btn btn-outline-secondary" onclick="filterReports('EAST')">EAST</button>
                <button type="button" class="btn btn-outline-secondary" onclick="filterReports('EUROPE')">EUROPE</button>
            </div>
            <table class="table table-striped" id="report-table">
                <thead>
                    <tr>
                        <th>Rat</th>
                        <th>Server</th>
                        <th>Loss</th>
                        <th>Date</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Reports will be dynamically populated here -->
                </tbody>
            </table>
            <div class="d-flex justify-content-between">
                <div>
                    <select id="entries-per-page" class="form-control">
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="75">75</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div>
                    <button class="btn btn-outline-secondary" onclick="firstPage()">First</button>
                    <button class="btn btn-outline-secondary" onclick="prevPage()">Previous</button>
                    <button class="btn btn-outline-secondary" onclick="nextPage()">Next</button>
                    <button class="btn btn-outline-secondary" onclick="lastPage()">Last</button>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-light text-center py-4 mt-5">
        <div class="container">
            <p>&copy; 2025 RatDB</p>
        </div>
    </footer>
    <button id="theme-toggle" class="btn btn-dark position-fixed" style="bottom: 10px; left: 10px;" onclick="toggleTheme()">Dark Mode</button>
    <script src="scripts.js"></script>
</body>
</html>
