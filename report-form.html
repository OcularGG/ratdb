<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Report</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        @font-face {
            font-family: 'Hack-ZeroSlash';
            src: url('fonts/hack/hack-regular.woff2') format('woff2'),
                 url('fonts/hack/hack-regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'Lato', sans-serif;
        }
        code, pre, .tooltip-icon {
            font-family: 'Hack-ZeroSlash', monospace;
        }
    </style>
</head>
<body class="bg-light text-dark">
    <header class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">RatDB</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="classification.html">Report Classification</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="privacy.html">Privacy Policy</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="terms.html">Terms of Use</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-primary ml-3" onclick="window.location.href='login.html'">Login with Discord</button>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <main class="container mt-5">
        <h1 class="text-center">Submit a Report</h1>
        <form id="report-form" class="mt-4" action="submit-report.php" method="POST">
            <div class="form-group">
                <label for="rat">Rat:</label>
                <input type="text" id="rat" name="rat" class="form-control" maxlength="100" required>
            </div>
            <div class="form-group">
                <label for="known-aliases">Known Aliases:</label>
                <div id="known-aliases-container">
                    <input type="text" id="known-aliases" name="knownAliases[]" class="form-control mb-2" maxlength="100">
                </div>
                <button type="button" class="btn btn-outline-secondary" onclick="addKnownAlias()">Add Alias</button>
            </div>
            <div class="form-group">
                <label for="discord">Discord <span class="tooltip-icon" data-toggle="tooltip" title="This should be their username, not their Discord display name.">&#9432;</span>:</label>
                <div id="discord-container">
                    <input type="text" id="discord" name="discord[]" class="form-control mb-2">
                </div>
                <button type="button" class="btn btn-outline-secondary" onclick="addDiscord()">Add Discord</button>
            </div>
            <div class="form-group">
                <label for="discord-display-name">Discord Display Name <span class="tooltip-icon" data-toggle="tooltip" title="This should be their Discord display name, not their username.">&#9432;</span>:</label>
                <input type="text" id="discord-display-name" name="discordDisplayName" class="form-control">
            </div>
            <div class="form-group">
                <label for="current-guild">Current Guild:</label>
                <input type="text" id="current-guild" name="currentGuild" class="form-control" maxlength="100">
                <button type="button" class="btn btn-outline-secondary mt-2" onclick="markNoGuild()">Not in a Guild</button>
            </div>
            <div class="form-group">
                <label for="previous-guilds">Previous Guilds:</label>
                <div id="previous-guilds-container">
                    <input type="text" id="previous-guilds" name="previousGuilds[]" class="form-control mb-2" maxlength="100">
                </div>
                <button type="button" class="btn btn-outline-secondary" onclick="addPreviousGuild()">Add Previous Guild</button>
            </div>
            <div class="form-group">
                <label for="date-of-incident">Date of Incident:</label>
                <input type="date" id="date-of-incident" name="dateOfIncident" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="incident-type">Incident Type:</label>
                <input type="text" id="incident-type" name="incidentType" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="incident-report">Incident Report:</label>
                <textarea id="incident-report" name="incidentReport" class="form-control" required></textarea>
            </div>
            <div class="form-group">
                <label for="loss">Loss:</label>
                <input type="number" id="loss" name="loss" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="server">Server:</label>
                <select id="server" name="server" class="form-control" required>
                    <option value="WEST">WEST</option>
                    <option value="EAST">EAST</option>
                    <option value="EUROPE">EUROPE</option>
                </select>
            </div>
            <div class="form-group">
                <label for="evidence">Evidence:</label>
                <select id="evidence-type" class="form-control mb-2" onchange="handleEvidenceTypeChange()">
                    <option value="image">Image</option>
                    <option value="video">Video</option>
                    <option value="audio">Audio</option>
                    <option value="link">Link</option>
                </select>
                <input type="file" id="evidence" name="evidence" class="form-control-file" accept="image/*,video/*,audio/*">
            </div>
            <div class="form-group">
                <div class="cf-turnstile" data-sitekey="YOUR_SITE_KEY"></div>
            </div>
            <div class="form-group text-center">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Exit</button>
            </div>
        </form>
    </main>
    <footer class="bg-light text-center py-4 mt-5">
        <div class="container">
            <p>&copy; 2025 RatDB</p>
        </div>
    </footer>
    <script src="scripts.js"></script>
    <script>
        function addKnownAlias() {
            const container = document.getElementById('known-aliases-container');
            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'knownAliases[]';
            input.classList.add('form-control', 'mb-2');
            input.maxLength = 100;
            container.appendChild(input);
        }

        function addDiscord() {
            const container = document.getElementById('discord-container');
            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'discord[]';
            input.classList.add('form-control', 'mb-2');
            container.appendChild(input);
        }

        function markNoGuild() {
            document.getElementById('current-guild').value = 'Not in a Guild';
        }

        function addPreviousGuild() {
            const container = document.getElementById('previous-guilds-container');
            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'previousGuilds[]';
            input.classList.add('form-control', 'mb-2');
            input.maxLength = 100;
            container.appendChild(input);
        }

        function handleEvidenceTypeChange() {
            const evidence = document.getElementById('evidence');
            const evidenceType = document.getElementById('evidence-type').value;
            switch (evidenceType) {
                case 'image':
                    evidence.accept = 'image/*';
                    break;
                case 'video':
                    evidence.accept = 'video/*';
                    break;
                case 'audio':
                    evidence.accept = 'audio/*';
                    break;
                case 'link':
                    evidence.type = 'url';
                    evidence.accept = '';
                    break;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            $('[data-toggle="tooltip"]').tooltip();
        });
    </script>
</body>
</html>
