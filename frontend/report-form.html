<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Report</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="bg-dark text-white">
    <header class="d-flex justify-content-between p-3">
        <h1>Submit a Report</h1>
        <div class="d-flex align-items-center">
            <select id="language-selector" class="form-control mr-3">
                <option value="en">English</option>
                <option value="en-GB">British English</option>
                <option value="es">Spanish</option>
                <option value="es-ES">Spain Spanish</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="ko">Korean</option>
                <option value="fr">French</option>
                <option value="it">Italian</option>
                <option value="de">German</option>
                <option value="ar">Arabic</option>
                <option value="hi">Hindi</option>
                <option value="ja">Japanese</option>
                <option value="tr">Turkish</option>
                <option value="fa">Persian</option>
            </select>
            <button class="btn btn-outline-light" onclick="window.location.href='login.html'">Login</button>
        </div>
    </header>
    <main class="container">
        <form id="report-form" class="mt-4">
            <div class="form-group">
                <label for="rat">Rat:</label>
                <input type="text" id="rat" name="rat" class="form-control" maxlength="100" required>
            </div>
            <div class="form-group">
                <label for="known-aliases">Known Aliases:</label>
                <input type="text" id="known-aliases" name="knownAliases" class="form-control" maxlength="100">
            </div>
            <div class="form-group">
                <label for="discord">Discord <span class="tooltip-icon" data-toggle="tooltip" title="This should be their username, not their Discord display name.">&#9432;</span>:</label>
                <input type="text" id="discord" name="discord" class="form-control">
            </div>
            <div class="form-group">
                <label for="discord-display-name">Discord Display Name <span class="tooltip-icon" data-toggle="tooltip" title="This should be their Discord display name, not their username.">&#9432;</span>:</label>
                <input type="text" id="discord-display-name" name="discordDisplayName" class="form-control">
            </div>
            <div class="form-group">
                <label for="discord-aliases">Discord Aliases:</label>
                <div id="discord-aliases-container">
                    <input type="text" id="discord-aliases" name="discordAliases[]" class="form-control mb-2">
                </div>
                <button type="button" class="btn btn-outline-light" onclick="addDiscordAlias()">Add Alias</button>
            </div>
            <div class="form-group">
                <label for="discord-display-name-aliases">Discord Display Name Aliases:</label>
                <div id="discord-display-name-aliases-container">
                    <input type="text" id="discord-display-name-aliases" name="discordDisplayNameAliases[]" class="form-control mb-2">
                </div>
                <button type="button" class="btn btn-outline-light" onclick="addDiscordDisplayNameAlias()">Add Display Name Alias</button>
            </div>
            <div class="form-group">
                <label for="current-guild">Current Guild:</label>
                <input type="text" id="current-guild" name="currentGuild" class="form-control" maxlength="100">
                <button type="button" class="btn btn-outline-light mt-2" onclick="markNoGuild()">Not in a Guild</button>
            </div>
            <div class="form-group">
                <label for="previous-guilds">Previous Guilds:</label>
                <div id="previous-guilds-container">
                    <input type="text" id="previous-guilds" name="previousGuilds[]" class="form-control mb-2" maxlength="100">
                </div>
                <button type="button" class="btn btn-outline-light" onclick="addPreviousGuild()">Add Previous Guild</button>
            </div>
            <div class="form-group">
                <label for="date-of-incident">Date of Incident:</label>
                <input type="date" id="date-of-incident" name="dateOfIncident" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="incident-report">Incident Report:</label>
                <textarea id="incident-report" name="incidentReport" class="form-control" required></textarea>
            </div>
            <div class="form-group">
                <label for="loss">Loss:</label>
                <input type="number" id="loss" name="loss" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="server">Server:</label>
                <select id="server" name="server" class="form-control" required>
                    <option value="WEST">WEST</option>
                    <option value="EAST">EAST</option>
                    <option value="EUROPE">EUROPE</option>
                </select>
            </div>
            <div class="form-group">
                <label for="evidence">Evidence:</label>
                <select id="evidence-type" class="form-control mb-2" onchange="handleEvidenceTypeChange()">
                    <option value="image">Image</option>
                    <option value="video">Video</option>
                    <option value="audio">Audio</option>
                    <option value="link">Link</option>
                </select>
                <input type="file" id="evidence" name="evidence" class="form-control-file" accept="image/*,video/*,audio/*">
            </div>
            <div class="form-group">
                <div class="cf-turnstile" data-sitekey="your-site-key"></div>
            </div>
            <button type="submit" class="btn btn-outline-light">Submit</button>
        </form>
    </main>
    <footer class="text-center mt-5">
        <a href="classification.html" class="text-white">Report Classification</a>
        <a href="privacy.html" class="text-white mx-3">Privacy Policy</a>
        <a href="terms.html" class="text-white">Terms of Use</a>
    </footer>
    <button id="theme-toggle" class="btn btn-light position-fixed" style="bottom: 10px; left: 10px;">Toggle Theme</button>
    <script src="scripts.js"></script>
    <script>
        function addDiscordAlias() {
            const container = document.getElementById('discord-aliases-container');
            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'discordAliases[]';
            input.classList.add('form-control', 'mb-2');
            container.appendChild(input);
        }

        function addDiscordDisplayNameAlias() {
            const container = document.getElementById('discord-display-name-aliases-container');
            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'discordDisplayNameAliases[]';
            input.classList.add('form-control', 'mb-2');
            container.appendChild(input);
        }

        function markNoGuild() {
            document.getElementById('current-guild').value = 'Not in a Guild';
        }

        function addPreviousGuild() {
            const container = document.getElementById('previous-guilds-container');
            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'previousGuilds[]';
            input.classList.add('form-control', 'mb-2');
            input.maxLength = 100;
            container.appendChild(input);
        }

        function handleEvidenceTypeChange() {
            const evidence = document.getElementById('evidence');
            const evidenceType = document.getElementById('evidence-type').value;
            switch (evidenceType) {
                case 'image':
                    evidence.accept = 'image/*';
                    break;
                case 'video':
                    evidence.accept = 'video/*';
                    break;
                case 'audio':
                    evidence.accept = 'audio/*';
                    break;
                case 'link':
                    evidence.type = 'url';
                    evidence.accept = '';
                    break;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            $('[data-toggle="tooltip"]').tooltip();
        });
    </script>
</body>
</html>
